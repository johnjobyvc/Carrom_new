<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrom Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="profile">
        <label>
          Username
          <input id="username" maxlength="16" value="Player" />
        </label>
        <button id="saveProfile">Save Profile</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel left">
        <h2>Main Menu</h2>
        <div class="btn-group">
          <button data-mode="ai">Play vs AI</button>
          <button data-mode="local">Play Local Multiplayer</button>
          <button data-mode="online">Play Online (Simulated)</button>
          <button id="practiceBtn">Practice</button>
        </div>

        <h3>Scoreboard</h3>
        <ul id="scoreboard" class="scoreboard"></ul>

        <h3>Stats</h3>
        <ul id="stats" class="stats"></ul>

        <h3>Achievements</h3>
        <ul id="achievements" class="achievements"></ul>

        <h3>Customization</h3>
        <label>
          Game Level
          <select id="levelSelect">
            <option value="1">Level 1 (Normal)</option>
            <option value="2">Level 2 (Hard)</option>
          </select>
        </label>
        <label>
          Theme
          <select id="themeSelect">
            <option value="classic">Classic</option>
            <option value="night">Night</option>
            <option value="mint">Mint</option>
          </select>
        </label>
      </section>

      <section class="board-wrap">
        <div class="board-main">
          <canvas id="board" width="760" height="760" aria-label="Carrom board"></canvas>
          <p class="hint">Left-click striker line to place striker. Right-click and drag on striker to set power, then release to shoot.</p>
        </div>
        <aside class="game-meta" aria-label="Game status">
          <div id="modeLabel">Mode: Not Started</div>
          <div id="levelLabel">Game Level: 1</div>
          <div id="turnLabel">Turn: -</div>
          <div id="timerLabel">Turn Timer: 25s</div>
        </aside>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
