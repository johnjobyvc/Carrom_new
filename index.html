<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>カロムゲーム</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="profile">
        <label>
          ユーザー名
          <input id="username" maxlength="16" value="プレイヤー" />
        </label>
        <button id="saveProfile">プロフィールを保存</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel left">
        <h2>メインメニュー</h2>
        <div class="btn-group">
          <button data-mode="ai">AIと対戦</button>
          <button data-mode="local">ローカル対戦</button>
          <button data-mode="online">オンライン対戦（シミュレーション）</button>
          <button id="practiceBtn">練習</button>
        </div>

        <h3>スコアボード</h3>
        <ul id="scoreboard" class="scoreboard"></ul>

        <h3>実績</h3>
        <ul id="achievements" class="achievements"></ul>

        <h3>カスタマイズ</h3>
        <label>
          ゲームレベル
          <select id="levelSelect">
            <option value="1">レベル1（通常）</option>
            <option value="2">レベル2（難しい）</option>
          </select>
        </label>
        <label>
          自分のコイン色
          <select id="coinColorSelect">
            <option value="black">黒</option>
            <option value="white">白</option>
          </select>
        </label>
        <label>
          テーマ
          <select id="themeSelect">
            <option value="classic">クラシック</option>
            <option value="night">ナイト</option>
            <option value="mint">ミント</option>
          </select>
        </label>
      </section>

      <section class="board-wrap">
        <div class="board-main">
          <canvas id="board" width="760" height="760" aria-label="カロム盤"></canvas>
          <p class="hint">ストライカーラインをクリックして配置します。ストライカーからドラッグして強さと方向を設定します。青い点線は予測軌道、赤とオレンジは衝突後の進行方向を示します。</p>
        </div>
        <aside class="game-meta" aria-label="ゲーム状態">
          <div id="modeLabel">モード: 未開始</div>
          <div id="levelLabel">ゲームレベル: 1</div>
          <div id="turnLabel">ターン: -</div>
          <div id="timerLabel">ターンタイマー: 25秒</div>
        </aside>
      </section>

    </main>

    <script src="script.js"></script>
  </body>
</html>
